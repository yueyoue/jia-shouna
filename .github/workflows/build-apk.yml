name: Build Android APK & Package Web

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build Debug APK
        run: |
          cd android-app
          ./gradlew assembleDebug

      - name: Build Release APK
        run: |
          cd android-app
          ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android-app/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package web admin
        run: |
          mkdir -p dist
          cd dist
          cp -r ../backend .
          cp -r ../web-admin .
          cp ../database/schema.sql .
          mkdir -p backend/uploads/{images,apks,backups}
          tar -czf jia-shouna-web-v1.0.0.tar.gz backend/ web-admin/ schema.sql
          cd ..

      - name: Upload web package to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/jia-shouna-web-v1.0.0.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload web package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-package
          path: dist/jia-shouna-web-v1.0.0.tar.gz
