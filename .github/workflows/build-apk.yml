name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: android-app
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List outputs
        run: find android-app -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release
          path: android-app/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Package web
        if: always()
        run: |
          mkdir -p release
          cp -r backend release/ 2>/dev/null || true
          cp -r web-admin release/ 2>/dev/null || true
          cp database/schema.sql release/ 2>/dev/null || true
          mkdir -p release/backend/uploads/images
          mkdir -p release/backend/uploads/apks
          mkdir -p release/backend/uploads/backups
          cd release && tar -czf ../jia-shouna-web.tar.gz . && cd ..

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/app/build/outputs/apk/release/app-release-unsigned.apk
            jia-shouna-web.tar.gz
        env:
          GITHUB_TOKEN: \x24{{ secrets.GITHUB_TOKEN }}
