name: Build Android APK & Package Web

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        working-directory: android-app
        run: gradle assembleDebug

      - name: Build Release APK
        working-directory: android-app
        run: gradle assembleRelease

      - name: Upload Debug APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android-app/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release and Upload APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: *** secrets.GITHUB_TOKEN }}

  package-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package web admin
        run: |
          mkdir -p dist
          cd dist
          cp -r ../backend .
          cp -r ../web-admin .
          cp ../database/schema.sql .
          mkdir -p backend/uploads/images
          mkdir -p backend/uploads/apks
          mkdir -p backend/uploads/backups
          tar -czf jia-shouna-web-v1.0.0.tar.gz backend/ web-admin/ schema.sql

      - name: Upload web package to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/jia-shouna-web-v1.0.0.tar.gz
        env:
          GITHUB_TOKEN: *** secrets.GITHUB_TOKEN }}

      - name: Upload web package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-package
          path: dist/jia-shouna-web-v1.0.0.tar.gz
