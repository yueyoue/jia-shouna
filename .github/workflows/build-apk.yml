name: Build APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android-app/app/release.keystore.p12
            echo "Keystore decoded from secret"
          else
            # Generate a deterministic keystore for consistent signing
            if [ ! -f android-app/app/release.keystore.p12 ]; then
              echo "Generating new release keystore..."
              keytool -genkey -v \
                -keystore android-app/app/release.keystore.p12 \
                -storetype PKCS12 \
                -storepass jiashouna2024 \
                -keypass jiashouna2024 \
                -keyalg RSA \
                -keysize 2048 \
                -validity 36500 \
                -alias jiashouna \
                -dname "CN=JiaShouNa, OU=App, O=JiaShouNa, L=Beijing, ST=Beijing, C=CN"
              echo "Keystore generated. For consistent signing, set KEYSTORE_BASE64 secret:"
              echo "base64 -w0 android-app/app/release.keystore.p12"
            else
              echo "Using existing keystore from repo"
            fi
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (Signed)
        working-directory: android-app
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List outputs
        run: find android-app -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release
          path: android-app/app/build/outputs/apk/release/app-release.apk

      - name: Package web
        if: always()
        run: |
          mkdir -p release
          cp -r backend release/ 2>/dev/null || true
          cp -r web-admin release/ 2>/dev/null || true
          cp database/schema.sql release/ 2>/dev/null || true
          mkdir -p release/backend/uploads/images
          mkdir -p release/backend/uploads/apks
          mkdir -p release/backend/uploads/backups
          cd release && tar -czf ../jia-shouna-web.tar.gz . && cd ..

      # --- Auto version & release on push to main ---
      - name: Generate version tag
        if: github.ref == 'refs/heads/main'
        id: version
        run: |
          TAG="v$(date +%Y%m%d.%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

      - name: Get short commit SHA
        if: github.ref == 'refs/heads/main'
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "构建 ${{ steps.version.outputs.tag }} (${{ steps.sha.outputs.sha }})"
          body: |
            ## 📦 自动构建

            **提交**: `${{ steps.sha.outputs.sha }}`
            **时间**: ${{ github.event.head_commit.timestamp }}
            **信息**: ${{ github.event.head_commit.message }}

            ### 📥 下载
            - `app-debug.apk` — 调试版（可直接安装）
            - `app-release.apk` — 发布版（已签名）
            - `jia-shouna-web.tar.gz` — Web 后端部署包
          files: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/app/build/outputs/apk/release/app-release.apk
            jia-shouna-web.tar.gz
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Also release on manual tag push ---
      - name: Upload to GitHub Release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/app/build/outputs/apk/release/app-release.apk
            jia-shouna-web.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
