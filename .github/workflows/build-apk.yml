name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b22c2b863 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: android-app
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List outputs
        run: find android-app -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: success()
        with:
          name: app-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: success()
        with:
          name: app-release
          path: android-app/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Package web
        if: always()
        run: |
          mkdir -p release
          cp -r backend release/ 2>/dev/null || true
          cp -r web-admin release/ 2>/dev/null || true
          cp database/schema.sql release/ 2>/dev/null || true
          mkdir -p release/backend/uploads/images
          mkdir -p release/backend/uploads/apks
          mkdir -p release/backend/uploads/backups
          cd release && tar -czf ../jia-shouna-web.tar.gz . && cd ..

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/app/build/outputs/apk/release/app-release-unsigned.apk
            jia-shouna-web.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
